<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espelho de Decisões</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0c0f; --surface: #13131a; --border: rgba(255,255,255,0.08);
    --gold: #c9a96e; --text: #e8e3d9; --muted: #7a7068;
    --a1: #6e9fc9; --a2: #c96e6e; --a3: #6ec9a0;
    --a4: #c9b56e; --a5: #a06ec9; --a6: #6ec9c9;
  }
  body { font-family: 'Cormorant Garamond', Georgia, serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse 60% 50% at 20% 20%, rgba(201,169,110,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 40% 60% at 80% 80%, rgba(110,159,201,0.04) 0%, transparent 60%);
  }
  .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 60px 24px 100px; }

  /* HEADER */
  .header { text-align: center; margin-bottom: 64px; animation: fadeDown 0.8s ease both; }
  .eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; margin-bottom: 20px; opacity: 0.8; }
  .header h1 { font-size: clamp(2.4rem, 6vw, 4rem); font-weight: 300; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 16px; }
  .header h1 em { font-style: italic; color: var(--gold); }
  .header p { color: var(--muted); font-size: 1.1rem; font-weight: 300; max-width: 500px; margin: 0 auto; line-height: 1.6; }

  /* INPUT */
  .input-section { animation: fadeUp 0.8s ease 0.2s both; }
  .input-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 12px; }
  .decision-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 20px 24px; color: var(--text); font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 300; resize: none; outline: none; min-height: 120px; transition: border-color 0.3s, box-shadow 0.3s; line-height: 1.5; }
  .decision-input::placeholder { color: var(--muted); opacity: 0.5; }
  .decision-input:focus { border-color: rgba(201,169,110,0.4); box-shadow: 0 0 0 3px rgba(201,169,110,0.06), 0 8px 32px rgba(0,0,0,0.3); }
  .btn-analyze { margin-top: 20px; width: 100%; padding: 18px 32px; background: transparent; border: 1px solid var(--gold); border-radius: 4px; color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; letter-spacing: 0.05em; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
  .btn-analyze::before { content: ''; position: absolute; inset: 0; background: var(--gold); transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease; }
  .btn-analyze:hover::before { transform: scaleX(1); }
  .btn-analyze:hover { color: var(--bg); }
  .btn-analyze span { position: relative; z-index: 1; }
  .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-analyze:disabled::before { display: none; }

  /* LOADING */
  .loading { display: none; text-align: center; padding: 60px 0; animation: fadeIn 0.4s ease; }
  .loading.on { display: block; }
  .orb { width: 48px; height: 48px; border: 1px solid rgba(201,169,110,0.3); border-top-color: var(--gold); border-radius: 50%; margin: 0 auto 20px; animation: spin 1.2s linear infinite; }
  .loading p { color: var(--muted); font-style: italic; }

  /* RESULTS */
  .results { display: none; animation: fadeUp 0.6s ease both; }
  .results.on { display: block; }
  .results-header { text-align: center; margin: 64px 0 40px; }
  .results-header h2 { font-size: 1.8rem; font-weight: 300; font-style: italic; color: var(--muted); margin-bottom: 8px; }
  .echo { font-size: 1.4rem; color: var(--text); font-weight: 400; font-style: italic; }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 40px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 28px; position: relative; overflow: hidden; transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s; animation: cardIn 0.5s ease both; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .card[data-l="razao"]::before    { background: var(--a1); } .card[data-l="razao"]:hover    { border-color: rgba(110,159,201,0.3); }
  .card[data-l="emocao"]::before   { background: var(--a2); } .card[data-l="emocao"]:hover   { border-color: rgba(201,110,110,0.3); }
  .card[data-l="futuro"]::before   { background: var(--a3); } .card[data-l="futuro"]:hover   { border-color: rgba(110,201,160,0.3); }
  .card[data-l="sabedoria"]::before{ background: var(--a4); } .card[data-l="sabedoria"]:hover{ border-color: rgba(201,181,110,0.3); }
  .card[data-l="risco"]::before    { background: var(--a5); } .card[data-l="risco"]:hover    { border-color: rgba(160,110,201,0.3); }
  .card[data-l="outros"]::before   { background: var(--a6); } .card[data-l="outros"]:hover   { border-color: rgba(110,201,201,0.3); }
  .card-icon { font-size: 1.6rem; margin-bottom: 12px; display: block; }
  .card-name { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 4px; }
  .card[data-l="razao"] .card-name    { color: var(--a1); }
  .card[data-l="emocao"] .card-name   { color: var(--a2); }
  .card[data-l="futuro"] .card-name   { color: var(--a3); }
  .card[data-l="sabedoria"] .card-name{ color: var(--a4); }
  .card[data-l="risco"] .card-name    { color: var(--a5); }
  .card[data-l="outros"] .card-name   { color: var(--a6); }
  .card-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 14px; }
  .card-body  { color: var(--muted); font-size: 1rem; line-height: 1.7; font-weight: 300; }

  .verdict { background: var(--surface); border: 1px solid rgba(201,169,110,0.2); border-radius: 6px; padding: 40px; position: relative; overflow: hidden; }
  .verdict::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .verdict-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; margin-bottom: 16px; }
  .verdict-text  { font-size: 1.3rem; font-weight: 300; line-height: 1.7; color: var(--text); margin-bottom: 24px; }
  .verdict-q     { font-style: italic; color: var(--gold); font-size: 1.15rem; line-height: 1.6; padding-top: 20px; border-top: 1px solid var(--border); }

  .btn-reset { display: block; margin: 40px auto 0; padding: 12px 32px; background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--muted); font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; cursor: pointer; transition: all 0.3s; }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  .card:nth-child(1){animation-delay:.05s} .card:nth-child(2){animation-delay:.10s}
  .card:nth-child(3){animation-delay:.15s} .card:nth-child(4){animation-delay:.20s}
  .card:nth-child(5){animation-delay:.25s} .card:nth-child(6){animation-delay:.30s}

  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(20px)}  to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
  @keyframes spin     { to{transform:rotate(360deg)} }
  @keyframes cardIn   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="container">

  <header class="header">
    <div class="eyebrow">Ferramenta de clareza</div>
    <h1>O <em>Espelho</em><br>de Decisões</h1>
    <p>Toda decisão difícil tem seis faces. Esta ferramenta ilumina cada uma delas — e depois te entrega a pergunta que realmente importa.</p>
  </header>

  <section class="input-section" id="inputSection">
    <label class="input-label" for="decision">Qual é a sua decisão?</label>
    <textarea id="decision" class="decision-input"
      placeholder="Ex: Devo pedir demissão do meu emprego? / Devo terminar esse relacionamento? / Devo abrir meu próprio negócio?"
      rows="4"></textarea>
    <button class="btn-analyze" id="btnAnalyze">
      <span>Revelar as seis perspectivas →</span>
    </button>
  </section>

  <div class="loading" id="loading">
    <div class="orb"></div>
    <p>O espelho está refletindo...</p>
  </div>

  <section class="results" id="results">
    <div class="results-header">
      <h2>Você perguntou sobre</h2>
      <div class="echo" id="echo"></div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="verdict">
      <div class="verdict-label">Síntese do espelho</div>
      <div class="verdict-text" id="verdictText"></div>
      <div class="verdict-q"   id="verdictQ"></div>
    </div>
    <button class="btn-reset" id="btnReset">← Nova decisão</button>
  </section>

</div>
<script>
const META = [
  {key:'razao',    icon:'◈', name:'Razão',    title:'O que os fatos dizem'},
  {key:'emocao',   icon:'◉', name:'Emoção',   title:'O que o corpo sente'},
  {key:'futuro',   icon:'◬', name:'Futuro',   title:'Daqui a 10 anos'},
  {key:'sabedoria',icon:'◎', name:'Sabedoria',title:'O que um sábio diria'},
  {key:'risco',    icon:'◧', name:'Risco',    title:'O que pode dar errado'},
  {key:'outros',   icon:'◌', name:'Impacto',  title:'Quem mais é afetado'},
];

const DB = {
  emprego:{
    razao:"Antes de decidir, separe fatos de sentimentos: quanto você ganha agora, qual é a estabilidade do setor, quantos meses de reserva você tem? Demissões voluntárias sem emprego garantido costumam levar entre 3 a 9 meses para se resolver. A lógica fria também pergunta: o problema é o trabalho, ou algo que você carregaria para qualquer trabalho?",
    emocao:"Preste atenção ao que acontece no seu corpo domingo à noite antes de uma segunda-feira — esse sinal não mente. Mas note: o que sentes é esgotamento real ou ansiedade passageira? O desgaste acumulado pode distorcer a percepção. Às vezes a exaustão pede férias, não demissão. Outras vezes, o corpo já decidiu antes da mente.",
    futuro:"Daqui a 10 anos, nenhuma das duas escolhas parecerá tão definitiva quanto parece agora. Permanecer pode significar estabilidade ou estagnação. Sair pode significar crescimento ou arrependimento — dependendo do que vier depois. O que importa é: qual versão do seu currículo e da sua vida você quer ter construído?",
    sabedoria:"Quem já viveu isso diria: nunca saia de algo, vá sempre em direção a algo. A diferença entre fuga e movimento é crucial. Um sábio também diria para não tomar decisões permanentes em estados temporários de exaustão — mas reconheceria que certas situações causam dano real e progressivo.",
    risco:"Os riscos de sair são visíveis: renda, estrutura de dias, identidade. Os riscos de ficar são menos óbvios: oportunidades perdidas, deterioração da autoestima, efeito que anos de insatisfação têm na saúde e nos relacionamentos. O maior risco é tomar a decisão errada pelo medo do risco.",
    outros:"Sua decisão afeta quem depende financeiramente de você — mas também: você permanecendo num lugar que te esgota afeta todos ao seu redor de formas silenciosas. Pessoas infelizes no trabalho levam isso para casa.",
    sintese:"Essa decisão vive na tensão entre segurança e significado — e você provavelmente já sabe qual lado está ganhando dentro de você. O que resta é descobrir se as condições externas tornam essa mudança viável agora, ou se ela precisa ser preparada antes de acontecer.",
    pergunta:"Se o medo de ficar sem renda não existisse, você já teria saído — ou ainda teria dúvidas?"
  },
  relacionamento:{
    razao:"Observe padrões, não momentos isolados. Com que frequência surgem os conflitos? Eles se resolvem ou se repetem em ciclos? A razão não mede amor, mas mede se o relacionamento funciona na prática — respeito, colaboração, crescimento mútuo.",
    emocao:"O que você sente quando pensa em um futuro sem essa pessoa? E o que sente quando imagina daqui a 5 anos exatamente igual ao presente? Ficar por medo de solidão e ficar por amor real podem parecer idênticos por fora — só você sente a diferença por dentro.",
    futuro:"Você consegue visualizar essa pessoa ao seu lado daqui a 10 anos — não como projeção ideal, mas como ela é hoje? Relacionamentos não melhoram com o tempo por si sós. Se o esforço já existe e as coisas não mudam, o futuro provavelmente repete o presente.",
    sabedoria:"Quem passou por isso diria: a dificuldade em si não é motivo para sair, mas a ausência de vontade de resolver é. O que distingue crises superáveis de situações insustentáveis é se há reciprocidade — se ambos querem resolver, ou apenas um carrega o peso.",
    risco:"Os riscos de sair: solidão, reconstrução, luto. Os riscos de ficar: perder anos em algo que não vai mudar, reprimir quem você é. Nenhum caminho é sem custo — a questão é qual custo você consegue pagar.",
    outros:"'Ficar pelos filhos' numa relação de conflito constante pode fazer mais dano do que uma separação saudável. E ficar para não magoar terceiros é tratar sua própria vida como sacrifício pelos outros.",
    sintese:"Essa decisão não é sobre certo e errado — é sobre compatibilidade real, crescimento mútuo e quanto de você mesmo você precisa preservar. O amor raramente é o problema; a questão é se o amor sozinho é suficiente para sustentar uma vida inteira.",
    pergunta:"Você está lutando pelo relacionamento — ou lutando contra a solidão de sair dele?"
  },
  negocio:{
    razao:"Existe validação real da ideia? Alguém já pagou por algo parecido? Você tem clareza de como vai gerar receita e quanto tempo até o break-even? Os maiores erros de empreendedores não são de execução, são de premissa — assumir que existe mercado antes de testar.",
    emocao:"Empreender é emocionalmente brutal. Não basta gostar da ideia — você precisa aguentar os meses em que nada funciona, a solidão de decidir, os questionamentos. A pergunta não é 'você acredita no produto?' mas 'você consegue tolerar incerteza prolongada sem se destruir?'",
    futuro:"Daqui a 10 anos, o arrependimento de não ter tentado é tão real quanto o de ter perdido dinheiro. Mas 'tentar' não precisa ser tudo ou nada: começar pequeno e em paralelo testa a ideia sem destruir a segurança financeira.",
    sabedoria:"Quem já passou por isso diria: o melhor momento de abrir um negócio é quando você tem um problema real para resolver, não quando está insatisfeito com a vida. Insatisfação é uma péssima fundação; propósito claro e conhecimento do mercado são a fundação certa.",
    risco:"Quanto você pode perder? Quanto tempo consegue sobreviver sem receita? Os riscos menos visíveis são relacionais (amigos que viram sócios) e psicológicos (identidade atrelada ao sucesso do negócio). Calcule todos eles.",
    outros:"Quem depende de você financeiramente é afetado diretamente. Mas considere: os melhores negócios existem porque melhoram a vida de alguém além do fundador — e isso também se torna o combustível que mantém o empreendedor vivo nos momentos difíceis.",
    sintese:"Empreender é uma das decisões mais pessoais que existem — porque exige que você aposte em si mesmo de uma forma que poucos outros contextos exigem. A questão não é se a ideia é boa: é se você está pronto para o processo, não apenas para o resultado.",
    pergunta:"Você quer ser empreendedor — ou quer que esse negócio específico exista no mundo? Você sabe a diferença entre essas duas coisas?"
  },
  mudanca:{
    razao:"Compare oportunidades concretas: custo de vida, mercado de trabalho, rede de contatos. Mudar de cidade raramente resolve problemas internos — mas pode criar condições externas que antes eram impossíveis. A razão pergunta: o que especificamente muda com a mudança?",
    emocao:"Existe algo que puxa você para o novo lugar, ou algo que te empurra para fora do atual? Ambos podem ser válidos, mas têm dinâmicas diferentes. Mudanças motivadas por atração tendem a ser mais sustentáveis do que as motivadas por fuga — porque o que você foge costuma ir junto.",
    futuro:"Daqui a 10 anos, lugares que hoje parecem distantes se tornam familiares. O que dura é o que você construiu lá: relacionamentos, carreira, identidade. A pergunta do futuro não é sobre o lugar — é sobre quem você se torna no processo de reconstruir tudo do zero.",
    sabedoria:"Quem já fez grandes mudanças geográficas diria: os primeiros seis meses são sempre mais difíceis do que o imaginado, e os primeiros três anos revelam se foi a decisão certa. Raramente alguém que se move com intenção clara se arrepende permanentemente.",
    risco:"Perda de rede de suporte, adaptação cultural, custo da transição. O risco que menos se fala é o isolamento emocional — os primeiros anos num lugar novo podem ser solitários de formas que ninguém avisa.",
    outros:"Quem fica sente a sua ausência de maneiras que você só vai entender depois. Mas ficar apenas para não deixar as pessoas que ama é também uma forma de se perder.",
    sintese:"Mudanças geográficas são ao mesmo tempo práticas e profundamente existenciais. Raramente são apenas sobre o lugar — são sobre quem você quer ser e o que quer construir. A clareza sobre o 'por quê' determina se a mudança funciona.",
    pergunta:"Você está indo em direção a algo que não existe onde você está — ou tentando deixar algo para trás que vai junto?"
  },
  geral:{
    razao:"Separe o que você sabe de fato do que está assumindo. Liste as informações que tem e as que estão faltando. Muitas decisões difíceis parecem impossíveis porque estamos decidindo no escuro — com mais dados, o caminho costuma ficar mais claro.",
    emocao:"O que seu corpo diz quando você imagina cada caminho? Não o que sua mente racionaliza — o que você sente fisicamente nos primeiros segundos, antes de começar a argumentar. Esse sinal é antigo e honesto. Pode não ser suficiente para decidir sozinho, mas sempre é necessário ouvi-lo.",
    futuro:"Imagine-se daqui a 10 anos olhando para esse momento. Qual decisão você se arrepende de não ter tomado? O arrependimento de não agir é estatisticamente mais frequente e duradouro do que o arrependimento de ter tentado.",
    sabedoria:"Uma pessoa sábia que te conhece bem provavelmente já sabe o que você deveria fazer — e você provavelmente já sabe o que ela diria. A sabedoria não resolve a decisão, mas enxerga o que a ansiedade esconde: que a maioria das coisas que nos paralisam são menores do que parecem.",
    risco:"Todo caminho tem risco — inclusive o de não decidir, que é também uma escolha. A diferença entre risco bem avaliado e medo disfarçado de cautela é que o risco bem avaliado sabe exatamente o que pode acontecer. Quando o medo é vago, geralmente está exagerando.",
    outros:"As pessoas que te amam são mais resilientes do que o medo nos faz crer. E permanecer numa situação que te esgota também os afeta — só que de formas mais silenciosas.",
    sintese:"Decisões verdadeiramente difíceis raramente têm uma resposta objetivamente certa — têm uma resposta certa para quem você é e o que quer construir. O trabalho não é encontrar a resposta perfeita, mas ser honesto o suficiente para reconhecer qual caminho está mais alinhado com seus valores reais.",
    pergunta:"Se você soubesse que não ia decepcionar ninguém com nenhuma das escolhas, o que você decidiria — e o que isso te diz?"
  }
};

function detect(text) {
  const t = text.toLowerCase();
  if(/emprego|trabalho|demiss|cargo|empresa|salário|chefe|carreira/.test(t)) return 'emprego';
  if(/relacionamento|namoro|casamento|divorc|termin|separar|parceiro|namorad/.test(t)) return 'relacionamento';
  if(/negócio|empreend|startup|abrir|investir|sócio|produto|vender/.test(t)) return 'negocio';
  if(/mudar|cidade|país|morar|mudan|imigr|relocar/.test(t)) return 'mudanca';
  return 'geral';
}

document.getElementById('btnAnalyze').addEventListener('click', go);
document.getElementById('decision').addEventListener('keydown', e => { if(e.key==='Enter' && (e.metaKey||e.ctrlKey)) go(); });
document.getElementById('btnReset').addEventListener('click', reset);

function go() {
  const val = document.getElementById('decision').value.trim();
  if(val.length < 8) {
    const ta = document.getElementById('decision');
    ta.style.borderColor = 'rgba(201,110,110,0.5)';
    setTimeout(()=>ta.style.borderColor='',1500);
    return;
  }
  document.getElementById('btnAnalyze').disabled = true;
  const inp = document.getElementById('inputSection');
  inp.style.opacity = '0.4'; inp.style.pointerEvents = 'none';
  document.getElementById('loading').classList.add('on');

  setTimeout(() => {
    document.getElementById('loading').classList.remove('on');
    render(val, DB[detect(val)]);
  }, 1800);
}

function render(decision, d) {
  const echo = decision.length > 80 ? decision.slice(0,80)+'…' : decision;
  document.getElementById('echo').textContent = `"${echo}"`;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  META.forEach(m => {
    const c = document.createElement('div');
    c.className = 'card'; c.dataset.l = m.key;
    c.innerHTML = `<span class="card-icon">${m.icon}</span><div class="card-name">${m.name}</div><div class="card-title">${m.title}</div><div class="card-body">${d[m.key]||''}</div>`;
    grid.appendChild(c);
  });

  document.getElementById('verdictText').textContent = d.sintese || '';
  document.getElementById('verdictQ').textContent    = d.pergunta ? `A pergunta que você precisa responder: ${d.pergunta}` : '';
  document.getElementById('results').classList.add('on');
  setTimeout(()=>document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'}),100);
}

function reset() {
  document.getElementById('results').classList.remove('on');
  document.getElementById('decision').value = '';
  document.getElementById('btnAnalyze').disabled = false;
  const inp = document.getElementById('inputSection');
  inp.style.opacity = '1'; inp.style.pointerEvents = 'all';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
